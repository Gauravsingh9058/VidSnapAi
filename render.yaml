services:
  - type: web
    name: vidsnapai
    runtime: docker
    plan: starter
    healthCheckPath: /healthz
    maxShutdownDelaySeconds: 120
    dockerfilePath: ./Dockerfile
    disk:
      name: app-data
      mountPath: /var/data
      sizeGB: 10
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vidsnapai-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: SOCIAL_TOKEN_ENCRYPTION_SECRET
        generateValue: true
      - key: UPLOAD_ROOT
        value: /var/data/uploads
      - key: GUNICORN_THREADS
        value: "8"
      - key: GUNICORN_TIMEOUT
        value: "300"
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

databases:
  - name: vidsnapai-db
    plan: basic-256mb
