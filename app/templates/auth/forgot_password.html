{% extends "base.html" %}

{% block public_content %}
<section class="auth-section">
    <div class="auth-card">
        <div>
            <span class="eyebrow">Password reset</span>
            <h1>Forgot your password?</h1>
            <p>Enter your email and we will simulate the reset flow for this MVP.</p>
        </div>
        <form method="post" class="stack-form">
            {{ form.hidden_tag() }}
            <label>
                <span>Email</span>
                {{ form.email(class="input") }}
            </label>
            {{ form.submit(class="button button-primary button-block") }}
        </form>
        <div class="auth-links">
            <a href="{{ url_for('auth.login') }}">Back to login</a>
        </div>
    </div>
</section>
{% endblock %}
